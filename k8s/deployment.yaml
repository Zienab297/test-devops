apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-test-main
  labels:
    app: devops-test-main
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-test-main
  template:
    metadata:
      labels:
        app: devops-test-main
    spec:
      containers:
        - name: devops-test-main
          image: ${{ secrets.DOCKER_USERNAME }}/devops-test-main:latest
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10