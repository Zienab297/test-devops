name: Docker Publish

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Login to GitHub Container Registry
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 2. Build image
      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}/hello-python .

      # 3. Push image
      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository }}/hello-python